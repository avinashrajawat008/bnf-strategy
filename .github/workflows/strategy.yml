name: BNF Strategy

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4    # v3 → v4
    
    - name: Setup Python
      uses: actions/setup-python@v5    # v4 → v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install yfinance pandas numpy requests
    
    - name: Run strategy
      run: python strategy.py
