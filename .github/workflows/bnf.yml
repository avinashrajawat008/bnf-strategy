name: BNF Strategy

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [run-strategy]

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas numpy requests
      - run: python strategy.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategy-state
          path: |
            state.json
            trading_log.txt
