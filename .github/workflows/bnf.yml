name: BNF Strategy

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [run-strategy]

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run strategy
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python strategy.py

      - name: Upload state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategy-state
          path: |
            state.json
            trading_log.txt
